<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRIDLOCK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Montserrat:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="launch-page">
    <audio id="bg-music" loop preload="auto" aria-hidden="true">
      <source src="assets/bg-music.mp3" type="audio/mpeg" />
    </audio>
    <iframe
      id="app-frame"
      class="app-frame"
      src="about:blank"
      title="GRIDLOCK Workshop"
      hidden
    ></iframe>
    <div
      class="comic-launch"
      id="comic-launch"
      hidden
      aria-hidden="true"
      role="status"
      aria-live="polite"
      aria-label="Opening workshop"
    >
      <div class="comic-launch__burst" aria-hidden="true">
        <div class="comic-launch__burst-stack">
          <div class="comic-launch__rays"></div>
          <div class="comic-launch__ring"></div>
          <p class="comic-launch__word">始めましょう!</p>
        </div>
      </div>
    </div>

    <div class="page">
      <main class="main" aria-label="GRIDLOCK title">
        <h1 class="logo">GRIDLOCK</h1>
        <p class="tagline" lang="ja">グリッドロック</p>
      </main>

      <div class="actions">
        <a class="start-btn" href="app.html">START</a>
      </div>

      <p class="start-prompt" aria-hidden="true">Hit the button to start building!</p>

      <footer class="sound-footer">
        <p class="sound-text">
          Awesome sounds ahead. Turn up your volume to hear!
        </p>
        <div class="sound-icon" aria-hidden="true">
          <img
            class="headphone-badge"
            src="assets/volume-icon.svg"
            alt=""
            width="44"
            height="44"
          />
        </div>
      </footer>
    </div>
    <script src="sounds-animations.js" defer></script>
    <script src="launch-transition.js" defer></script>
    <script src="cursor.js" defer></script>
    <script>
      (function () {
        var bgMusic = document.getElementById("bg-music");
        if (!bgMusic) return;
        window.addEventListener("message", function (e) {
          if (e.data && e.data.type === "gridlock-setMuted") {
            bgMusic.muted = !!e.data.muted;
          }
        });
      })();
    </script>
  </body>
</html>
